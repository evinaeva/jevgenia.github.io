<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gift Options for Vlad</title>
  <meta name="description" content="A curated shortlist of four premium gift options for Vlad." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #090b0f;
      --card: #12161d;
      --panel: #151a22;
      --text: #edf1f7;
      --muted: #a3acba;
      --line: rgba(255, 255, 255, 0.12);
      --line-strong: rgba(255, 255, 255, 0.18);
      --focus: #c9d4e4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at 50% -15%, #1a212e 0%, transparent 45%), var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    .page {
      width: min(1180px, calc(100% - 2.4rem));
      margin: 0 auto;
      padding: 3.8rem 0 5rem;
    }

    .hero {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--line);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 3.8vw, 3rem);
      letter-spacing: 0.01em;
      line-height: 1.15;
      font-weight: 600;
    }

    .hero p {
      margin: 0.8rem 0 0;
      max-width: 66ch;
      color: var(--muted);
      font-size: clamp(1rem, 1.8vw, 1.12rem);
    }

    .cards {
      display: grid;
      gap: 1.6rem;
    }

    .gift-card {
      border-radius: 24px;
      border: 1px solid var(--line);
      overflow: hidden;
      background: linear-gradient(180deg, var(--card) 0%, #10151c 100%);
      box-shadow: 0 22px 55px rgba(0, 0, 0, 0.5);
    }

    .card-text {
      padding: 1.55rem 1.6rem 1.7rem;
      border-bottom: 1px solid var(--line-strong);
      background: linear-gradient(180deg, #151a22 0%, #131820 100%);
    }

    .card-title {
      margin: 0;
      font-size: clamp(1.25rem, 2.3vw, 1.7rem);
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .meta-grid {
      margin-top: 0.95rem;
      display: grid;
      gap: 0.65rem;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .meta-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0.65rem 0.75rem;
      background: rgba(255, 255, 255, 0.01);
    }

    .meta-label {
      display: block;
      margin-bottom: 0.2rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.7rem;
    }

    .section-label {
      margin: 1rem 0 0.35rem;
      color: #ced6e2;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.72rem;
    }

    .why-text { margin: 0; color: #dce2ec; }

    .list {
      margin: 0;
      padding-left: 1.05rem;
      color: #d5dce8;
    }

    .list li { margin: 0.15rem 0; }

    .links {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .links a,
    .links span {
      font-size: 0.84rem;
      color: #d8dfeb;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.34rem 0.7rem;
      background: #161d27;
    }

    .links a:hover,
    .links a:focus-visible {
      border-color: rgba(255, 255, 255, 0.36);
    }

    .card-media {
      background: #0e1218;
      padding: 0.95rem;
    }

    .image-trigger {
      display: block;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #0d1116;
      cursor: pointer;
      padding: 0;
      color: inherit;
      position: relative;
    }

    .image-trigger img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
    }

    .image-hint {
      position: absolute;
      right: 0.65rem;
      bottom: 0.65rem;
      padding: 0.2rem 0.52rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(10, 12, 16, 0.8);
      font-size: 0.72rem;
      color: #dee5f1;
    }

    .modal {
      position: fixed;
      inset: 0;
      padding: 1.2rem;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(2, 3, 6, 0.88);
      z-index: 20;
    }

    .modal.open { display: flex; }

    .modal-dialog {
      width: min(1200px, 95vw);
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      background: #0d1117;
      padding: 0.8rem;
      position: relative;
    }

    .modal-image {
      width: 100%;
      max-height: 82vh;
      object-fit: contain;
      display: block;
      border-radius: 12px;
      background: #090c10;
    }

    .modal-counter {
      position: absolute;
      left: 1.2rem;
      bottom: 1rem;
      font-size: 0.76rem;
      color: #d7deea;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 999px;
      padding: 0.2rem 0.56rem;
      background: rgba(10, 12, 16, 0.82);
    }

    .modal button {
      position: absolute;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(12, 15, 20, 0.9);
      color: #eff4fd;
      cursor: pointer;
      font-size: 1.05rem;
    }

    .close-btn { top: 0.8rem; right: 0.8rem; }
    .prev-btn, .next-btn { top: 50%; transform: translateY(-50%); }
    .prev-btn { left: 0.8rem; }
    .next-btn { right: 0.8rem; }

    button:focus-visible,
    a:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    @media (max-width: 760px) {
      .page { width: min(1180px, calc(100% - 1.2rem)); padding-top: 2.7rem; }
      .card-text { padding: 1.2rem; }
      .meta-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>Gift Options for Vlad</h1>
      <p>A curated shortlist of four strong options, with rationale, trade-offs, and delivery context.</p>
    </header>

    <section class="cards" id="cards" aria-label="Gift options list"></section>
  </main>

  <div class="modal" id="galleryModal" role="dialog" aria-modal="true" aria-label="Image gallery">
    <div class="modal-dialog">
      <button class="close-btn" id="closeModal" type="button" aria-label="Close gallery">×</button>
      <button class="prev-btn" id="prevImage" type="button" aria-label="Previous image">←</button>
      <img class="modal-image" id="modalImage" src="" alt="" />
      <button class="next-btn" id="nextImage" type="button" aria-label="Next image">→</button>
      <span class="modal-counter" id="modalCounter"></span>
    </div>
  </div>

  <script>
    const giftData = [
      {
        title: "Lewis Hamilton Bodywork in Acrylic",
        price: "See product page",
        delivery: "5 working days",
        whyChosen: "Vlad is a Formula 1 fan, and Lewis Hamilton is specifically his favorite driver. This option feels highly personal and display-worthy for an office. It includes a real bodywork fragment, which gives it collectible and tactile value.",
        pros: [
          "Strong personal relevance",
          "Excellent office display piece",
          "Real motorsport memorabilia"
        ],
        cons: ["Unclear how much he values a pre-2025 Hamilton item specifically"],
        links: [
          "https://www.f1authentics.com/products/lewis-hamilton-2015-bodywork-in-acrylicc?variant=53518241333629",
          "https://www.f1authentics.com/products/lewis-hamilton-2016-bodywork-in-acrylic-2?variant=53518237335933",
          "https://www.f1authentics.com/products/lewis-hamilton-2018-bodywork-in-acrylic-1?variant=53518457176445",
          "https://www.f1authentics.com/products/lewis-hamilton-2014-bodywork-acrylic-1?variant=53518191985021"
        ],
        images: [
          { src: "assets/gifts/hamilton-2018.svg", alt: "Lewis Hamilton bodywork in acrylic, dark product render" },
          { src: "assets/gifts/hamilton-2016.svg", alt: "Lewis Hamilton bodywork in acrylic, 2016 variant render" },
          { src: "assets/gifts/hamilton-2015.svg", alt: "Lewis Hamilton bodywork in acrylic, 2015 variant render" }
        ]
      },
      {
        title: "New York Rangers Framed Hockey Puck Shadowbox",
        price: "See product page",
        delivery: "4–10 business days",
        whyChosen: "Vlad likes hockey and specifically New York Rangers. One player option is especially relevant because he once dreamed of being a goalie.",
        pros: [
          "Strong sports relevance",
          "Suitable for office interior",
          "Personal angle through the goalie connection"
        ],
        cons: ["Unclear whether these exact players matter to him personally"],
        links: [
          "https://shop.nhl.com/new-york-rangers/autographed-new-york-rangers-henrik-lundqvist-fanatics-authentic-framed-rangers-career-statistic-hockey-puck-shadowbox-with-hockey-puck/t-14269682+p-0467714187189+z-9-4024400432",
          "https://www.fanatics.com/nhl/new-york-rangers/chris-kreider-new-york-rangers-autographed-fanatics-authentic-framed-hockey-puck-shadowbox/o-1384+t-03601882+p-7955664547825+z-9-3711988090"
        ],
        images: [
          { src: "assets/gifts/rangers-lundqvist.svg", alt: "New York Rangers framed puck shadowbox visual, Lundqvist" },
          { src: "assets/gifts/rangers-kreider.svg", alt: "New York Rangers framed puck shadowbox visual, Kreider" }
        ]
      },
      {
        title: "Traintrackr NYC Subway Circuit Board 2.0",
        price: "Around 200 EUR / see product page",
        delivery: "7–14 business days",
        whyChosen: "Vlad really liked New York. This item connects directly to NYC and works well as a premium desk or office display object.",
        pros: [
          "Distinctive and memorable",
          "Strong New York connection",
          "Premium design object"
        ],
        cons: ["Less personally targeted than the Formula 1 option"],
        links: ["https://store.moma.org/en-ee/products/traintrackr-nyc-subway-circuit-board-2"],
        images: [
          { src: "assets/gifts/traintrackr-01.svg", alt: "Traintrackr NYC subway circuit board overview" },
          { src: "assets/gifts/traintrackr-02.svg", alt: "Traintrackr NYC subway circuit board detail" }
        ]
      },
      {
        title: "Airline Gift Card",
        price: "Not specified",
        delivery: "Not specified",
        whyChosen: "This is the most practical option because Vlad likes travelling and would almost certainly use it.",
        pros: [
          "Practical",
          "Very likely to be used"
        ],
        cons: [
          "Feels ordinary",
          "Less emotional and less memorable"
        ],
        links: [],
        images: [
          { src: "assets/gifts/airline-01.svg", alt: "Elegant airline gift card concept in dark tones" },
          { src: "assets/gifts/airline-02.svg", alt: "Airline travel gift visual for placeholder use" }
        ]
      }
    ];

    const cardsRoot = document.getElementById('cards');
    const modal = document.getElementById('galleryModal');
    const modalImage = document.getElementById('modalImage');
    const modalCounter = document.getElementById('modalCounter');
    const closeModalBtn = document.getElementById('closeModal');
    const prevBtn = document.getElementById('prevImage');
    const nextBtn = document.getElementById('nextImage');

    let activeCard = 0;
    let activeImage = 0;

    function renderCard(gift, cardIndex) {
      const card = document.createElement('article');
      card.className = 'gift-card';

      const top = document.createElement('div');
      top.className = 'card-text';
      top.innerHTML = `
        <h2 class="card-title">${gift.title}</h2>
        <div class="meta-grid">
          <div class="meta-item"><span class="meta-label">Price</span>${gift.price}</div>
          <div class="meta-item"><span class="meta-label">Delivery time</span>${gift.delivery}</div>
        </div>
        <p class="section-label">Why chosen</p>
        <p class="why-text">${gift.whyChosen}</p>
        <p class="section-label">Pros</p>
        <ul class="list">${gift.pros.map((item) => `<li>${item}</li>`).join('')}</ul>
        <p class="section-label">Cons</p>
        <ul class="list">${gift.cons.map((item) => `<li>${item}</li>`).join('')}</ul>
      `;

      const links = document.createElement('div');
      links.className = 'links';
      if (gift.links.length) {
        gift.links.forEach((url, index) => {
          const a = document.createElement('a');
          a.href = url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = gift.links.length === 1 ? 'Product link' : `Product link ${index + 1}`;
          links.appendChild(a);
        });
      } else {
        const span = document.createElement('span');
        span.textContent = 'No product page available';
        links.appendChild(span);
      }
      top.appendChild(links);

      const bottom = document.createElement('div');
      bottom.className = 'card-media';

      const trigger = document.createElement('button');
      trigger.type = 'button';
      trigger.className = 'image-trigger';
      trigger.setAttribute('aria-label', `Open ${gift.title} image gallery`);
      trigger.innerHTML = `
        <img src="${gift.images[0].src}" alt="${gift.images[0].alt}" />
        <span class="image-hint">${gift.images.length} image${gift.images.length > 1 ? 's' : ''}</span>
      `;
      trigger.addEventListener('click', () => openModal(cardIndex, 0));

      bottom.appendChild(trigger);
      card.append(top, bottom);
      return card;
    }

    function updateModal() {
      const imageSet = giftData[activeCard].images;
      const current = imageSet[activeImage];
      modalImage.src = current.src;
      modalImage.alt = current.alt;
      modalCounter.textContent = `${activeImage + 1} / ${imageSet.length}`;
    }

    function openModal(cardIndex, imageIndex) {
      activeCard = cardIndex;
      activeImage = imageIndex;
      updateModal();
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
      closeModalBtn.focus();
    }

    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
    }

    function changeImage(direction) {
      const imageCount = giftData[activeCard].images.length;
      activeImage = (activeImage + direction + imageCount) % imageCount;
      updateModal();
    }

    giftData.forEach((gift, index) => cardsRoot.appendChild(renderCard(gift, index)));

    closeModalBtn.addEventListener('click', closeModal);
    prevBtn.addEventListener('click', () => changeImage(-1));
    nextBtn.addEventListener('click', () => changeImage(1));

    modal.addEventListener('click', (event) => {
      if (event.target === modal) closeModal();
    });

    document.addEventListener('keydown', (event) => {
      if (!modal.classList.contains('open')) return;
      if (event.key === 'Escape') closeModal();
      if (event.key === 'ArrowLeft') changeImage(-1);
      if (event.key === 'ArrowRight') changeImage(1);
    });
  </script>
</body>
</html>
