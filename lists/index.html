<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ES Lists Import</title>

<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0b1222">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:     #04070c;
  --card:   #0c1424;
  --text:   #e6ecff;
  --muted:  #9aa7c7;
  --accent: #4f8cff;
  --err:    #ff6b6b;
  --ok:     #4cff91;
  --warn:   #ffd166;
}
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(1200px 600px at 70% -10%, #0b1f4a 0%, transparent 60%),
    radial-gradient(800px 500px at -20% 120%, #091a3a 0%, transparent 60%),
    var(--bg);
  color: var(--text);
  font-family: Manrope, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
}

.page {
  max-width: 680px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}

.btn {
  display: inline-flex;
  align-items: center;
  padding: 11px 16px;
  border-radius: 10px;
  text-decoration: none;
  color: var(--text);
  background: linear-gradient(180deg, #111c34, #0d162b);
  border: 1px solid #1d2a4d;
  transition: .18s ease;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  line-height: 1;
}
.btn:hover {
  border-color: #3f6fff;
  background: linear-gradient(180deg, #142347, #101b36);
  transform: translateY(-2px);
  box-shadow: 0 0 18px rgba(79,140,255,.45), 0 8px 24px rgba(0,0,0,.7);
}
.btn:disabled {
  opacity: .4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
.btn-primary {
  background: linear-gradient(180deg, #1a3a7a, #122660);
  border-color: #3f6fff;
  font-size: 15px;
  font-weight: 600;
  padding: 14px 28px;
  width: 100%;
  justify-content: center;
  margin-top: 8px;
}
.btn-primary:hover:not(:disabled) {
  background: linear-gradient(180deg, #1f4494, #162e78);
  box-shadow: 0 0 24px rgba(79,140,255,.55), 0 8px 24px rgba(0,0,0,.7);
}

.top-nav  { margin-bottom: 28px; }
.title    { margin: 0; text-align: center; font-size: clamp(28px,5vw,40px); letter-spacing: .5px; }
.subtitle { margin: 8px 0 28px; text-align: center; color: var(--muted); font-size: 15px; }

.block {
  background: linear-gradient(180deg, #0e172b 0%, #0b1222 100%);
  border: 1px solid #1d2a4d;
  border-radius: 14px;
  padding: 20px 22px;
  margin-bottom: 16px;
  box-shadow: 0 0 40px rgba(40,90,200,.15), 0 0 8px rgba(80,140,255,.15) inset;
}

details.block summary {
  cursor: pointer;
  font-size: 13px;
  color: var(--muted);
  user-select: none;
  list-style: none;
  display: flex;
  align-items: center;
  gap: 8px;
}
details.block summary::before { content: '⚙'; }
details.block[open] summary   { margin-bottom: 14px; }

.field-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}
.field-row label { font-size: 13px; color: var(--muted); }
.field-row input {
  background: #060d1c;
  border: 1px solid #1d2a4d;
  border-radius: 8px;
  padding: 9px 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color .15s;
  width: 100%;
}
.field-row input:focus { border-color: var(--accent); }
.save-row { display: flex; gap: 10px; align-items: center; }
.save-ok  { font-size: 13px; color: var(--ok); }

.url-status {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 10px;
  min-height: 18px;
}
.url-status.ready { color: var(--ok); }
.url-status.error { color: var(--err); }

.drop-zone {
  border: 2px dashed #1d2a4d;
  border-radius: 12px;
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .18s, background .18s;
  color: var(--muted);
}
.drop-zone:hover, .drop-zone.over {
  border-color: var(--accent);
  background: rgba(79,140,255,.06);
}
.drop-zone p    { margin: 6px 0; }
.drop-zone .icon { font-size: 32px; margin-bottom: 6px; }
.file-chosen { font-size: 13px; color: var(--accent); margin-top: 10px; }

.log-wrap {
  background: #02050c;
  border: 1px solid #1d2a4d;
  border-radius: 12px;
  overflow: hidden;
}
.log-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid #1d2a4d;
  font-size: 13px;
  color: var(--muted);
}
.log-header a { color: var(--accent); font-size: 12px; text-decoration: none; }
.log-header a:hover { text-decoration: underline; }
pre#log-out {
  margin: 0;
  padding: 14px 16px;
  font-size: 12px;
  font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 420px;
  overflow-y: auto;
  line-height: 1.6;
  color: #c8d4f0;
}
.log-info  { color: #c8d4f0; }
.log-error { color: var(--err); }
.log-warn  { color: var(--warn); }

.result {
  border-radius: 12px;
  padding: 16px 20px;
  font-size: 14px;
  font-weight: 600;
  text-align: center;
}
.result.ok      { background: rgba(76,255,145,.08);  border: 1px solid rgba(76,255,145,.25);  color: var(--ok); }
.result.partial { background: rgba(255,209,102,.08); border: 1px solid rgba(255,209,102,.25); color: var(--warn); }
.result.err     { background: rgba(255,107,107,.08); border: 1px solid rgba(255,107,107,.25); color: var(--err); }

.hidden { display: none !important; }
</style>
</head>
<body>
<main class="page">

  <div class="top-nav"><a class="btn" href="/">← Home</a></div>
  <h1 class="title">ES Lists Import</h1>
  <p class="subtitle">Загрузка баз в ExpertSender</p>

  <!-- Settings (token only) -->
  <details class="block" id="settings-details">
    <summary>Настройки</summary>
    <div class="field-row">
      <label>GitHub Token <span style="opacity:.6">(fine-grained PAT, Actions: write)</span></label>
      <input type="password" id="gh-token" autocomplete="off" placeholder="github_pat_…">
    </div>
    <div class="save-row">
      <button class="btn" onclick="saveToken()">Сохранить</button>
      <span class="save-ok hidden" id="save-ok">✓ Сохранено</span>
    </div>
  </details>

  <!-- Upload URL status -->
  <p class="url-status" id="url-status"></p>

  <!-- Drop zone -->
  <div class="block" style="padding:0">
    <div class="drop-zone" id="drop-zone">
      <div class="icon">📦</div>
      <p>Перетащи ZIP с базами</p>
      <p style="font-size:13px">или нажми для выбора файла</p>
      <input type="file" id="file-input" accept=".zip" hidden>
    </div>
  </div>
  <p class="file-chosen hidden" id="file-chosen"></p>

  <button class="btn btn-primary" id="import-btn" disabled onclick="startImport()">
    Загрузить базы
  </button>

  <div class="log-wrap hidden" id="log-wrap" style="margin-top:16px">
    <div class="log-header">
      <span>Логи</span>
      <span id="run-link"></span>
    </div>
    <pre id="log-out"></pre>
  </div>

  <div class="hidden" id="result-area" style="margin-top:12px"></div>

</main>

<script>
const REPO       = 'evinaeva/jevgenia.github.io';
const GCS_BUCKET = 'es-lists-jevgenia';
const BRANCH     = 'main';

// ── Token ──────────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('gh-token') || ''; }

function saveToken() {
  localStorage.setItem('gh-token', document.getElementById('gh-token').value.trim());
  const ok = document.getElementById('save-ok');
  ok.classList.remove('hidden');
  setTimeout(() => ok.classList.add('hidden'), 2000);
  initSession();
}

// ── Session (presigned upload URL) ────────────────────────────────────────
let sessionId    = null;
let uploadUrl    = null;
let gcsUploadPath = null;
let urlPollTimer = null;

function uuid() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
}

function setUrlStatus(msg, cls = '') {
  const el = document.getElementById('url-status');
  el.textContent = msg;
  el.className = 'url-status' + (cls ? ' ' + cls : '');
}

async function initSession() {
  const token = getToken();
  if (!token) return;

  uploadUrl    = null;
  gcsUploadPath = null;
  sessionId    = uuid();
  clearInterval(urlPollTimer);

  setUrlStatus('Подготовка к загрузке…');

  // Trigger es-get-upload-url workflow
  try {
    const resp = await fetch(
      `https://api.github.com/repos/${REPO}/actions/workflows/es-get-upload-url.yml/dispatches`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github+json',
          'X-GitHub-Api-Version': '2022-11-28',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ ref: BRANCH, inputs: { session_id: sessionId } }),
      }
    );
    if (!resp.ok) {
      const txt = await resp.text();
      setUrlStatus('Ошибка токена: ' + resp.status, 'error');
      return;
    }
  } catch (e) {
    setUrlStatus('Ошибка сети: ' + e.message, 'error');
    return;
  }

  // Poll for the presigned URL
  let attempts = 0;
  urlPollTimer = setInterval(async () => {
    attempts++;
    if (attempts > 40) {
      clearInterval(urlPollTimer);
      setUrlStatus('Timeout: не удалось получить URL загрузки. Попробуй обновить страницу.', 'error');
      return;
    }
    try {
      const r = await fetch(
        `https://storage.googleapis.com/${GCS_BUCKET}/sessions/${sessionId}/upload-url.json?_=${Date.now()}`
      );
      if (!r.ok) return;
      const data = await r.json();
      if (data.url) {
        clearInterval(urlPollTimer);
        uploadUrl     = data.url;
        gcsUploadPath = data.gcs_path;
        setUrlStatus('✓ Готово к загрузке', 'ready');
        checkReady();
      }
    } catch (_) {}
  }, 3000);
}

// ── File selection ──────────────────────────────────────────────────────────
let selectedFile = null;

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) setFile(fileInput.files[0]);
});

function setFile(f) {
  selectedFile = f;
  const info = document.getElementById('file-chosen');
  info.textContent = `✓ ${f.name}  (${(f.size / 1024 / 1024).toFixed(1)} MB)`;
  info.classList.remove('hidden');
  checkReady();
}

function checkReady() {
  document.getElementById('import-btn').disabled = !(selectedFile && uploadUrl);
}

// ── GCS upload via presigned URL ────────────────────────────────────────────
async function gcsUpload(file, signedUrl) {
  const resp = await fetch(signedUrl, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/octet-stream' },
    body: file,
  });
  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error(`GCS upload failed ${resp.status}: ${txt.slice(0, 200)}`);
  }
}

// ── GitHub Actions: trigger import ─────────────────────────────────────────
async function triggerImport(logId) {
  const resp = await fetch(
    `https://api.github.com/repos/${REPO}/actions/workflows/es-import.yml/dispatches`,
    {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${getToken()}`,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ ref: BRANCH, inputs: { gcs_path: gcsUploadPath, log_id: logId } }),
    }
  );
  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error(`Trigger failed ${resp.status}: ${txt.slice(0, 200)}`);
  }
}

async function findRunUrl() {
  for (let i = 0; i < 10; i++) {
    await sleep(3000);
    try {
      const r = await fetch(
        `https://api.github.com/repos/${REPO}/actions/runs?event=workflow_dispatch&branch=${BRANCH}&per_page=3`
      );
      const data = await r.json();
      if (data.workflow_runs?.length > 0) return data.workflow_runs[0].html_url;
    } catch (_) {}
  }
  return null;
}

// ── Log polling ─────────────────────────────────────────────────────────────
let lastLogCount = 0;

async function pollLogs(logId) {
  try {
    const r = await fetch(
      `https://storage.googleapis.com/${GCS_BUCKET}/logs/${logId}.json?_=${Date.now()}`
    );
    if (!r.ok) return null;
    return await r.json();
  } catch (_) { return null; }
}

function renderLogs(logs) {
  const el = document.getElementById('log-out');
  for (const e of logs.slice(lastLogCount)) {
    const span = document.createElement('span');
    span.className = `log-${e.level}`;
    span.textContent = `${e.t}  ${e.msg}\n`;
    el.appendChild(span);
  }
  if (logs.length > lastLogCount) {
    el.scrollTop = el.scrollHeight;
    lastLogCount = logs.length;
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Main import flow ────────────────────────────────────────────────────────
async function startImport() {
  const btn = document.getElementById('import-btn');
  btn.disabled = true;
  btn.textContent = 'Загружаю…';

  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('log-wrap').classList.remove('hidden');
  document.getElementById('log-out').textContent = '';
  lastLogCount = 0;

  const logId = sessionId;

  const addLocalLog = (msg, level = 'info') => {
    const el   = document.getElementById('log-out');
    const span = document.createElement('span');
    span.className  = `log-${level}`;
    span.textContent = `${new Date().toTimeString().slice(0, 8)}  ${msg}\n`;
    el.appendChild(span);
    el.scrollTop = el.scrollHeight;
  };

  try {
    addLocalLog(`Загружаю ZIP в GCS… (${(selectedFile.size/1024/1024).toFixed(1)} MB)`);
    await gcsUpload(selectedFile, uploadUrl);
    addLocalLog('ZIP загружен.');

    addLocalLog('Запускаю GitHub Actions workflow…');
    await triggerImport(logId);
    addLocalLog('Workflow запущен. Ожидаю логи…');

    findRunUrl().then(url => {
      if (url) {
        document.getElementById('run-link').innerHTML =
          `<a href="${url}" target="_blank" rel="noopener">→ GitHub Actions</a>`;
      }
    });

    btn.textContent = 'Выполняется…';
    let done = false, noData = 0;

    while (!done) {
      await sleep(3500);
      const data = await pollLogs(logId);
      if (!data) {
        if (++noData > 40) {
          addLocalLog('Нет ответа более 2 минут. Проверь GitHub Actions.', 'warn');
          break;
        }
        continue;
      }
      noData = 0;
      renderLogs(data.logs || []);
      if (['done', 'error', 'partial'].includes(data.status)) {
        done = true;
        showResult(data.status);
        // Prepare next session so next upload is ready
        sessionId = uuid();
        uploadUrl = null;
        gcsUploadPath = null;
        initSession();
      }
    }
  } catch (err) {
    addLocalLog(`Ошибка: ${err.message}`, 'error');
    showResult('error');
  }

  btn.disabled = false;
  btn.textContent = 'Загрузить базы';
  checkReady();
}

function showResult(status) {
  const el = document.getElementById('result-area');
  el.classList.remove('hidden');
  const map = {
    done:    { cls: 'ok',      text: '✓ Все базы успешно загружены в ES' },
    partial: { cls: 'partial', text: '⚠ Завершено с ошибками — см. логи' },
    error:   { cls: 'err',     text: '✗ Ошибка — см. логи выше' },
  };
  const { cls, text } = map[status] || map.error;
  el.innerHTML = `<div class="result ${cls}">${text}</div>`;
}

// ── Init ────────────────────────────────────────────────────────────────────
document.getElementById('gh-token').value = getToken();
if (getToken()) {
  document.getElementById('settings-details').open = false;
  initSession();
}
</script>
</body>
</html>
