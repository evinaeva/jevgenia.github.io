<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ES Lists Import</title>

<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0b1222">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:     #04070c;
  --card:   #0c1424;
  --text:   #e6ecff;
  --muted:  #9aa7c7;
  --accent: #4f8cff;
  --err:    #ff6b6b;
  --ok:     #4cff91;
  --warn:   #ffd166;
}
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(1200px 600px at 70% -10%, #0b1f4a 0%, transparent 60%),
    radial-gradient(800px 500px at -20% 120%, #091a3a 0%, transparent 60%),
    var(--bg);
  color: var(--text);
  font-family: Manrope, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
}

.page {
  max-width: 740px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}

.btn {
  display: inline-flex;
  align-items: center;
  padding: 11px 16px;
  border-radius: 10px;
  text-decoration: none;
  color: var(--text);
  background: linear-gradient(180deg, #111c34, #0d162b);
  border: 1px solid #1d2a4d;
  transition: .18s ease;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  line-height: 1;
}
.btn:hover {
  border-color: #3f6fff;
  background: linear-gradient(180deg, #142347, #101b36);
  transform: translateY(-2px);
  box-shadow: 0 0 18px rgba(79,140,255,.45), 0 8px 24px rgba(0,0,0,.7);
}
.btn:disabled {
  opacity: .4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
.btn-primary {
  background: linear-gradient(180deg, #1a3a7a, #122660);
  border-color: #3f6fff;
  font-size: 15px;
  font-weight: 600;
  padding: 14px 28px;
  width: 100%;
  justify-content: center;
  margin-top: 8px;
}
.btn-primary:hover:not(:disabled) {
  background: linear-gradient(180deg, #1f4494, #162e78);
  box-shadow: 0 0 24px rgba(79,140,255,.55), 0 8px 24px rgba(0,0,0,.7);
}

.top-nav { margin-bottom: 28px; }
.title   { margin: 0; text-align: center; font-size: clamp(28px,5vw,40px); letter-spacing: .5px; }
.subtitle { margin: 8px 0 28px; text-align: center; color: var(--muted); font-size: 15px; }

.block {
  background: linear-gradient(180deg, #0e172b 0%, #0b1222 100%);
  border: 1px solid #1d2a4d;
  border-radius: 14px;
  padding: 20px 22px;
  margin-bottom: 16px;
  box-shadow: 0 0 40px rgba(40,90,200,.15), 0 0 8px rgba(80,140,255,.15) inset;
}

/* drop zone */
.drop-zone {
  border: 2px dashed #1d2a4d;
  border-radius: 12px;
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .18s, background .18s;
  color: var(--muted);
}
.drop-zone:hover, .drop-zone.over {
  border-color: var(--accent);
  background: rgba(79,140,255,.06);
}
.drop-zone p { margin: 6px 0; }
.drop-zone .icon { font-size: 32px; margin-bottom: 6px; }
.file-chosen { font-size: 13px; color: var(--accent); margin-top: 10px; }

/* log */
.log-wrap {
  background: #02050c;
  border: 1px solid #1d2a4d;
  border-radius: 12px;
  overflow: hidden;
}
.log-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid #1d2a4d;
  font-size: 13px;
  color: var(--muted);
}
.log-header a { color: var(--accent); font-size: 12px; text-decoration: none; }
.log-header a:hover { text-decoration: underline; }
pre#log-out {
  margin: 0;
  padding: 14px 16px;
  font-size: 12px;
  font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 420px;
  overflow-y: auto;
  line-height: 1.6;
  color: #c8d4f0;
}
.log-info  { color: #c8d4f0; }
.log-error { color: var(--err); }
.log-warn  { color: var(--warn); }

/* result */
.result {
  border-radius: 12px;
  padding: 16px 20px;
  font-size: 14px;
  font-weight: 600;
  text-align: center;
}
.result.ok      { background: rgba(76,255,145,.08); border: 1px solid rgba(76,255,145,.25); color: var(--ok); }
.result.partial { background: rgba(255,209,102,.08); border: 1px solid rgba(255,209,102,.25); color: var(--warn); }
.result.err     { background: rgba(255,107,107,.08); border: 1px solid rgba(255,107,107,.25); color: var(--err); }

.hidden { display: none !important; }
</style>
</head>
<body>
<main class="page">

  <div class="top-nav"><a class="btn" href="/">← Home</a></div>
  <h1 class="title">ES Lists Import</h1>
  <p class="subtitle">Загрузка баз в ExpertSender</p>

  <!-- Drop zone -->
  <div class="block" style="padding:0">
    <div class="drop-zone" id="drop-zone">
      <div class="icon">📦</div>
      <p>Перетащи архив с базами</p>
      <p style="font-size:13px">ZIP, RAR, TGZ — или нажми для выбора файла</p>
      <input type="file" id="file-input" accept=".zip,.rar,.tgz,.tar.gz" hidden>
    </div>
  </div>
  <p class="file-chosen hidden" id="file-chosen"></p>

  <!-- Import button -->
  <button class="btn btn-primary" id="import-btn" disabled onclick="startImport()">
    Загрузить базы
  </button>

  <!-- Log -->
  <div class="log-wrap hidden" id="log-wrap" style="margin-top:16px">
    <div class="log-header">
      <span>Логи</span>
      <span id="run-link"></span>
    </div>
    <pre id="log-out"></pre>
  </div>

  <!-- Result -->
  <div class="hidden" id="result-area" style="margin-top:12px"></div>

</main>

<script>
// ── Config (no secrets) ────────────────────────────────────────────
const CF_BASE_URL = 'https://europe-west1-gen-lang-client-0771120655.cloudfunctions.net/es-api';
const GCS_BUCKET  = 'es-lists-jevgenia';
const REPO        = 'evinaeva/jevgenia.github.io';
const BRANCH      = 'main';

// ── File selection ──────────────────────────────────────────────
let selectedFile = null;
let uploadUrl    = null;
let gcsPath      = null;

const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) setFile(fileInput.files[0]);
});

function setFile(f) {
  selectedFile = f;
  uploadUrl    = null;
  gcsPath      = null;

  const info = document.getElementById('file-chosen');
  info.textContent = `✓ ${f.name}  (${(f.size / 1024 / 1024).toFixed(1)} MB)  — получаю URL для загрузки…`;
  info.classList.remove('hidden');
  document.getElementById('import-btn').disabled = true;

  // Fetch signed upload URL immediately after file selection
  const sessionId = uuid();
  fetch(`${CF_BASE_URL}/get-upload-url?session_id=${encodeURIComponent(sessionId)}&filename=${encodeURIComponent(f.name)}`)
    .then(r => {
      if (!r.ok) return r.text().then(t => { throw new Error(`CF error ${r.status}: ${t.slice(0,200)}`); });
      return r.json();
    })
    .then(data => {
      uploadUrl = data.url;
      gcsPath   = data.gcs_path;
      info.textContent = `✓ ${f.name}  (${(f.size / 1024 / 1024).toFixed(1)} MB)`;
      document.getElementById('import-btn').disabled = false;
    })
    .catch(err => {
      info.textContent = `✗ Не удалось получить URL: ${err.message}`;
      info.style.color = 'var(--err)';
    });
}

// ── UUID ────────────────────────────────────────────────────────────────────────
function uuid() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
}

// ── Log helpers ─────────────────────────────────────────────────────────
let lastLogCount = 0;

function addLocalLog(msg, level = 'info') {
  const el = document.getElementById('log-out');
  const span = document.createElement('span');
  span.className = `log-${level}`;
  const t = new Date().toTimeString().slice(0, 8);
  span.textContent = `${t}  ${msg}\n`;
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

function renderLogs(logs) {
  const el = document.getElementById('log-out');
  const newEntries = logs.slice(lastLogCount);
  for (const e of newEntries) {
    const span = document.createElement('span');
    span.className = `log-${e.level}`;
    span.textContent = `${e.t}  ${e.msg}\n`;
    el.appendChild(span);
  }
  if (newEntries.length > 0) {
    el.scrollTop = el.scrollHeight;
    lastLogCount = logs.length;
  }
}

async function pollLogs(logId) {
  const url = `https://storage.googleapis.com/${GCS_BUCKET}/logs/${logId}.json`;
  try {
    const r = await fetch(url + '?_=' + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch (_) {
    return null;
  }
}

async function findRunUrl() {
  for (let i = 0; i < 10; i++) {
    await sleep(3000);
    try {
      const r = await fetch(
        `https://api.github.com/repos/${REPO}/actions/runs?event=workflow_dispatch&branch=${BRANCH}&per_page=5`
      );
      const data = await r.json();
      if (data.workflow_runs && data.workflow_runs.length > 0) {
        return data.workflow_runs[0].html_url;
      }
    } catch (_) {}
  }
  return null;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Main flow ─────────────────────────────────────────────────────────────────
async function startImport() {
  if (!uploadUrl || !gcsPath || !selectedFile) return;

  const logId = gcsPath.split('/')[1]; // extract session_id from uploads/{id}/filename

  const btn = document.getElementById('import-btn');
  btn.disabled = true;
  btn.textContent = 'Загружаю…';

  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('log-wrap').classList.remove('hidden');
  document.getElementById('log-out').textContent = '';
  document.getElementById('run-link').innerHTML = '';
  lastLogCount = 0;

  try {
    // 1. Upload archive to GCS via signed URL
    addLocalLog(`Загружаю архив в GCS… (${(selectedFile.size/1024/1024).toFixed(1)} MB)`);
    const uploadResp = await fetch(uploadUrl, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/octet-stream' },
      body: selectedFile,
    });
    if (!uploadResp.ok) {
      const txt = await uploadResp.text();
      throw new Error(`GCS upload failed ${uploadResp.status}: ${txt.slice(0, 200)}`);
    }
    addLocalLog('Архив загружен в GCS.');

    // 2. Trigger import via Cloud Function
    addLocalLog('Запускаю GitHub Actions workflow…');
    const trigResp = await fetch(`${CF_BASE_URL}/trigger-import`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: logId, gcs_path: gcsPath }),
    });
    if (!trigResp.ok) {
      const txt = await trigResp.text();
      throw new Error(`Trigger failed ${trigResp.status}: ${txt.slice(0, 200)}`);
    }
    addLocalLog('Workflow запущен. Ожидаю обработку…');

    // 3. Find run URL (background)
    findRunUrl().then(url => {
      if (url) {
        document.getElementById('run-link').innerHTML =
          `<a href="${url}" target="_blank" rel="noopener">→ GitHub Actions</a>`;
      }
    });

    // 4. Poll GCS logs
    btn.textContent = 'Выполняется…';
    let done = false;
    let noDataCount = 0;

    while (!done) {
      await sleep(3500);
      const data = await pollLogs(logId);
      if (!data) {
        noDataCount++;
        if (noDataCount > 40) {
          addLocalLog('Нет ответа от воркера более 2 минут. Проверь GitHub Actions.', 'warn');
          break;
        }
        continue;
      }
      noDataCount = 0;
      renderLogs(data.logs || []);
      if (data.status === 'done' || data.status === 'error' || data.status === 'partial') {
        done = true;
        showResult(data.status);
      }
    }

  } catch (err) {
    addLocalLog(`Ошибка: ${err.message}`, 'error');
    showResult('error');
  }

  btn.disabled = false;
  btn.textContent = 'Загрузить базы';
  // Reset so user can upload again
  uploadUrl = null;
  gcsPath   = null;
  selectedFile = null;
  document.getElementById('file-chosen').classList.add('hidden');
}

function showResult(status) {
  const el = document.getElementById('result-area');
  el.classList.remove('hidden');
  const map = {
    done:    { cls: 'ok',      text: '✓ Все базы успешно загружены в ES' },
    partial: { cls: 'partial', text: '⚠ Завершено с ошибками — см. логи' },
    error:   { cls: 'err',     text: '✗ Ошибка — см. логи выше' },
  };
  const { cls, text } = map[status] || map.error;
  el.innerHTML = `<div class="result ${cls}">${text}</div>`;
}
</script>
</body>
</html>
