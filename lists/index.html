<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ES Lists Import</title>

<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0b1222">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:     #04070c;
  --card:   #0c1424;
  --text:   #e6ecff;
  --muted:  #9aa7c7;
  --accent: #4f8cff;
  --err:    #ff6b6b;
  --ok:     #4cff91;
  --warn:   #ffd166;
}
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(1200px 600px at 70% -10%, #0b1f4a 0%, transparent 60%),
    radial-gradient(800px 500px at -20% 120%, #091a3a 0%, transparent 60%),
    var(--bg);
  color: var(--text);
  font-family: Manrope, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
}

.page {
  max-width: 740px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}

.btn {
  display: inline-flex;
  align-items: center;
  padding: 11px 16px;
  border-radius: 10px;
  text-decoration: none;
  color: var(--text);
  background: linear-gradient(180deg, #111c34, #0d162b);
  border: 1px solid #1d2a4d;
  transition: .18s ease;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  line-height: 1;
}
.btn:hover {
  border-color: #3f6fff;
  background: linear-gradient(180deg, #142347, #101b36);
  transform: translateY(-2px);
  box-shadow: 0 0 18px rgba(79,140,255,.45), 0 8px 24px rgba(0,0,0,.7);
}
.btn:disabled {
  opacity: .4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
.btn-primary {
  background: linear-gradient(180deg, #1a3a7a, #122660);
  border-color: #3f6fff;
  font-size: 15px;
  font-weight: 600;
  padding: 14px 28px;
  width: 100%;
  justify-content: center;
  margin-top: 8px;
}
.btn-primary:hover:not(:disabled) {
  background: linear-gradient(180deg, #1f4494, #162e78);
  box-shadow: 0 0 24px rgba(79,140,255,.55), 0 8px 24px rgba(0,0,0,.7);
}

.top-nav { margin-bottom: 28px; }
.title   { margin: 0; text-align: center; font-size: clamp(28px,5vw,40px); letter-spacing: .5px; }
.subtitle { margin: 8px 0 28px; text-align: center; color: var(--muted); font-size: 15px; }

.block {
  background: linear-gradient(180deg, #0e172b 0%, #0b1222 100%);
  border: 1px solid #1d2a4d;
  border-radius: 14px;
  padding: 20px 22px;
  margin-bottom: 16px;
  box-shadow: 0 0 40px rgba(40,90,200,.15), 0 0 8px rgba(80,140,255,.15) inset;
}

details.block summary {
  cursor: pointer;
  font-size: 13px;
  color: var(--muted);
  user-select: none;
  list-style: none;
  display: flex;
  align-items: center;
  gap: 8px;
}
details.block summary::before { content: '⚙'; }
details.block[open] summary { margin-bottom: 16px; }

.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.settings-grid label {
  display: flex;
  flex-direction: column;
  gap: 5px;
  font-size: 13px;
  color: var(--muted);
}
.settings-grid label.full { grid-column: 1 / -1; }
.settings-grid input, .settings-grid textarea {
  background: #060d1c;
  border: 1px solid #1d2a4d;
  border-radius: 8px;
  padding: 9px 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color .15s;
  width: 100%;
}
.settings-grid textarea {
  resize: vertical;
  min-height: 80px;
  font-family: monospace;
  font-size: 11px;
}
.settings-grid input:focus, .settings-grid textarea:focus { border-color: var(--accent); }
.save-row { grid-column: 1 / -1; display: flex; gap: 10px; align-items: center; }
.save-ok  { font-size: 13px; color: var(--ok); }

.drop-zone {
  border: 2px dashed #1d2a4d;
  border-radius: 12px;
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .18s, background .18s;
  color: var(--muted);
}
.drop-zone:hover, .drop-zone.over {
  border-color: var(--accent);
  background: rgba(79,140,255,.06);
}
.drop-zone p { margin: 6px 0; }
.drop-zone .icon { font-size: 32px; margin-bottom: 6px; }
.file-chosen { font-size: 13px; color: var(--accent); margin-top: 10px; }

.log-wrap {
  background: #02050c;
  border: 1px solid #1d2a4d;
  border-radius: 12px;
  overflow: hidden;
}
.log-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid #1d2a4d;
  font-size: 13px;
  color: var(--muted);
}
.log-header a { color: var(--accent); font-size: 12px; text-decoration: none; }
.log-header a:hover { text-decoration: underline; }
pre#log-out {
  margin: 0;
  padding: 14px 16px;
  font-size: 12px;
  font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 420px;
  overflow-y: auto;
  line-height: 1.6;
  color: #c8d4f0;
}
.log-info  { color: #c8d4f0; }
.log-error { color: var(--err); }
.log-warn  { color: var(--warn); }

.result {
  border-radius: 12px;
  padding: 16px 20px;
  font-size: 14px;
  font-weight: 600;
  text-align: center;
}
.result.ok      { background: rgba(76,255,145,.08); border: 1px solid rgba(76,255,145,.25); color: var(--ok); }
.result.partial { background: rgba(255,209,102,.08); border: 1px solid rgba(255,209,102,.25); color: var(--warn); }
.result.err     { background: rgba(255,107,107,.08); border: 1px solid rgba(255,107,107,.25); color: var(--err); }

.hidden { display: none !important; }

@media (max-width: 520px) {
  .settings-grid { grid-template-columns: 1fr; }
  .settings-grid label.full { grid-column: 1; }
}
</style>
</head>
<body>
<main class="page">

  <div class="top-nav"><a class="btn" href="/">← Home</a></div>
  <h1 class="title">ES Lists Import</h1>
  <p class="subtitle">Загрузка баз в ExpertSender</p>

  <details class="block" id="settings-details">
    <summary>Настройки</summary>
    <div class="settings-grid">
      <label>
        GitHub Token <span title="Fine-grained PAT, permission Actions: write">(actions:write)</span>
        <input type="password" id="gh-token" autocomplete="off" placeholder="github_pat_…">
      </label>
      <label>
        GCS Bucket
        <input type="text" id="gcs-bucket" autocomplete="off" placeholder="es-lists-jevgenia">
      </label>
      <label class="full">
        GCS Service Account Key (JSON)
        <textarea id="gcs-sa-key" placeholder='{"type":"service_account","project_id":"…'></textarea>
      </label>
      <div class="save-row">
        <button class="btn" onclick="saveSettings()">Сохранить</button>
        <span class="save-ok hidden" id="save-ok">✓ Сохранено</span>
      </div>
    </div>
  </details>

  <div class="block" style="padding:0">
    <div class="drop-zone" id="drop-zone">
      <div class="icon">📦</div>
      <p>Перетащи ZIP с базами</p>
      <p style="font-size:13px">или нажми для выбора файла</p>
      <input type="file" id="file-input" accept=".zip" hidden>
    </div>
  </div>
  <p class="file-chosen hidden" id="file-chosen"></p>

  <button class="btn btn-primary" id="import-btn" disabled onclick="startImport()">
    Загрузить базы
  </button>

  <div class="log-wrap hidden" id="log-wrap" style="margin-top:16px">
    <div class="log-header">
      <span>Логи</span>
      <span id="run-link"></span>
    </div>
    <pre id="log-out"></pre>
  </div>

  <div class="hidden" id="result-area" style="margin-top:12px"></div>

</main>

<script>
const REPO     = 'evinaeva/jevgenia.github.io';
const WORKFLOW = 'es-import.yml';
const BRANCH   = 'main';

function loadSettings() {
  document.getElementById('gh-token').value   = localStorage.getItem('gh-token')   || '';
  document.getElementById('gcs-bucket').value = localStorage.getItem('gcs-bucket') || 'es-lists-jevgenia';
  document.getElementById('gcs-sa-key').value = localStorage.getItem('gcs-sa-key') || '';
  if (localStorage.getItem('gh-token')) {
    document.getElementById('settings-details').open = false;
  }
}
function saveSettings() {
  localStorage.setItem('gh-token',   document.getElementById('gh-token').value.trim());
  localStorage.setItem('gcs-bucket', document.getElementById('gcs-bucket').value.trim());
  localStorage.setItem('gcs-sa-key', document.getElementById('gcs-sa-key').value.trim());
  const ok = document.getElementById('save-ok');
  ok.classList.remove('hidden');
  setTimeout(() => ok.classList.add('hidden'), 2000);
  checkReady();
}

let selectedFile = null;
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) setFile(fileInput.files[0]);
});

function setFile(f) {
  selectedFile = f;
  const info = document.getElementById('file-chosen');
  info.textContent = `✓ ${f.name}  (${(f.size / 1024 / 1024).toFixed(1)} MB)`;
  info.classList.remove('hidden');
  checkReady();
}

function checkReady() {
  const ok = !!selectedFile
    && !!localStorage.getItem('gh-token')
    && !!localStorage.getItem('gcs-bucket')
    && !!localStorage.getItem('gcs-sa-key');
  document.getElementById('import-btn').disabled = !ok;
}

function pemToArrayBuffer(pem) {
  const b64 = pem.replace(/-----[^-]+-----/g, '').replace(/\s/g, '');
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf.buffer;
}

async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function toHex(buf) {
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function signedPutUrl(bucket, objectName, saJson, expiresIn = 3600) {
  const now = new Date();
  const datetime = now.toISOString().replace(/[-:.]/g, '').slice(0, 15) + 'Z';
  const date = datetime.slice(0, 8);

  const { client_email, private_key } = saJson;
  const credential = `${client_email}/${date}/auto/storage/goog4_request`;
  const host = 'storage.googleapis.com';
  const canonicalUri = '/' + bucket + '/' + objectName.split('/').map(encodeURIComponent).join('/');

  const qp = new URLSearchParams([
    ['X-Goog-Algorithm',     'GOOG4-RSA-SHA256'],
    ['X-Goog-Credential',    credential],
    ['X-Goog-Date',          datetime],
    ['X-Goog-Expires',       String(expiresIn)],
    ['X-Goog-SignedHeaders', 'host'],
  ]);
  qp.sort();
  const canonicalQuery = qp.toString();

  const canonicalRequest = [
    'PUT',
    canonicalUri,
    canonicalQuery,
    `host:${host}\n`,
    'host',
    'UNSIGNED-PAYLOAD',
  ].join('\n');

  const reqHash = await sha256hex(canonicalRequest);
  const stringToSign = [
    'GOOG4-RSA-SHA256',
    datetime,
    `${date}/auto/storage/goog4_request`,
    reqHash,
  ].join('\n');

  const keyBuf = pemToArrayBuffer(private_key);
  const cryptoKey = await crypto.subtle.importKey(
    'pkcs8', keyBuf,
    { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' },
    false, ['sign']
  );
  const sigBuf = await crypto.subtle.sign(
    'RSASSA-PKCS1-v1_5', cryptoKey,
    new TextEncoder().encode(stringToSign)
  );

  return `https://${host}${canonicalUri}?${canonicalQuery}&X-Goog-Signature=${toHex(sigBuf)}`;
}

async function gcsUpload(bucket, objectName, file, saJson) {
  const url = await signedPutUrl(bucket, objectName, saJson);
  const resp = await fetch(url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/octet-stream' },
    body: file,
  });
  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error(`GCS upload failed ${resp.status}: ${txt.slice(0, 200)}`);
  }
}

function uuid() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
}

async function triggerWorkflow(ghToken, gcsPath, logId) {
  const resp = await fetch(
    `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
    {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${ghToken}`,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ ref: BRANCH, inputs: { gcs_path: gcsPath, log_id: logId } }),
    }
  );
  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error(`Workflow dispatch failed ${resp.status}: ${txt.slice(0, 200)}`);
  }
}

async function findRunUrl() {
  for (let i = 0; i < 10; i++) {
    await sleep(3000);
    try {
      const r = await fetch(
        `https://api.github.com/repos/${REPO}/actions/runs?event=workflow_dispatch&branch=${BRANCH}&per_page=3`
      );
      const data = await r.json();
      if (data.workflow_runs && data.workflow_runs.length > 0) {
        return data.workflow_runs[0].html_url;
      }
    } catch (_) {}
  }
  return null;
}

let lastLogCount = 0;

async function pollLogs(bucket, logId) {
  try {
    const r = await fetch(
      `https://storage.googleapis.com/${bucket}/logs/${logId}.json?_=${Date.now()}`
    );
    if (!r.ok) return null;
    return await r.json();
  } catch (_) {
    return null;
  }
}

function renderLogs(logs) {
  const el = document.getElementById('log-out');
  const newEntries = logs.slice(lastLogCount);
  for (const e of newEntries) {
    const span = document.createElement('span');
    span.className = `log-${e.level}`;
    span.textContent = `${e.t}  ${e.msg}\n`;
    el.appendChild(span);
  }
  if (newEntries.length > 0) {
    el.scrollTop = el.scrollHeight;
    lastLogCount = logs.length;
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function startImport() {
  const ghToken  = localStorage.getItem('gh-token');
  const bucket   = localStorage.getItem('gcs-bucket');
  const saKeyRaw = localStorage.getItem('gcs-sa-key');

  let saJson;
  try { saJson = JSON.parse(saKeyRaw); }
  catch { return alert('Ошибка: GCS SA key невалидный JSON. Проверь настройки.'); }

  const btn = document.getElementById('import-btn');
  btn.disabled = true;
  btn.textContent = 'Загружаю…';

  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('log-wrap').classList.remove('hidden');
  document.getElementById('log-out').textContent = '';
  lastLogCount = 0;

  const logId   = uuid();
  const gcsPath = `uploads/${logId}/input.zip`;

  const addLocalLog = (msg, level = 'info') => {
    const el = document.getElementById('log-out');
    const span = document.createElement('span');
    span.className = `log-${level}`;
    const t = new Date().toTimeString().slice(0, 8);
    span.textContent = `${t}  ${msg}\n`;
    el.appendChild(span);
    el.scrollTop = el.scrollHeight;
  };

  try {
    addLocalLog(`Загружаю ZIP в GCS… (${(selectedFile.size/1024/1024).toFixed(1)} MB)`);
    await gcsUpload(bucket, gcsPath, selectedFile, saJson);
    addLocalLog('ZIP загружен.');

    addLocalLog('Запускаю GitHub Actions workflow…');
    await triggerWorkflow(ghToken, gcsPath, logId);
    addLocalLog('Workflow запущен. Ожидаю логи…');

    findRunUrl().then(url => {
      if (url) {
        document.getElementById('run-link').innerHTML =
          `<a href="${url}" target="_blank" rel="noopener">→ GitHub Actions</a>`;
      }
    });

    btn.textContent = 'Выполняется…';
    let done = false;
    let noDataCount = 0;

    while (!done) {
      await sleep(3500);
      const data = await pollLogs(bucket, logId);
      if (!data) {
        noDataCount++;
        if (noDataCount > 40) {
          addLocalLog('Нет ответа от воркера более 2 минут. Проверь GitHub Actions.', 'warn');
          break;
        }
        continue;
      }
      noDataCount = 0;
      renderLogs(data.logs || []);
      if (['done', 'error', 'partial'].includes(data.status)) {
        done = true;
        showResult(data.status);
      }
    }
  } catch (err) {
    addLocalLog(`Ошибка: ${err.message}`, 'error');
    showResult('error');
  }

  btn.disabled = false;
  btn.textContent = 'Загрузить базы';
}

function showResult(status) {
  const el = document.getElementById('result-area');
  el.classList.remove('hidden');
  const map = {
    done:    { cls: 'ok',      text: '✓ Все базы успешно загружены в ES' },
    partial: { cls: 'partial', text: '⚠ Завершено с ошибками — см. логи' },
    error:   { cls: 'err',     text: '✗ Ошибка — см. логи выше' },
  };
  const { cls, text } = map[status] || map.error;
  el.innerHTML = `<div class="result ${cls}">${text}</div>`;
}

loadSettings();
checkReady();
</script>
</body>
</html>
