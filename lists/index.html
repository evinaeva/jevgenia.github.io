<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ES Lists Import</title>

<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0b1222">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:     #04070c;
  --card:   #0c1424;
  --text:   #e6ecff;
  --muted:  #9aa7c7;
  --accent: #4f8cff;
  --err:    #ff6b6b;
  --ok:     #4cff91;
  --warn:   #ffd166;
}
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(1200px 600px at 70% -10%, #0b1f4a 0%, transparent 60%),
    radial-gradient(800px 500px at -20% 120%, #091a3a 0%, transparent 60%),
    var(--bg);
  color: var(--text);
  font-family: Manrope, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
}

.page {
  max-width: 740px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}

.btn {
  display: inline-flex;
  align-items: center;
  padding: 11px 16px;
  border-radius: 10px;
  text-decoration: none;
  color: var(--text);
  background: linear-gradient(180deg, #111c34, #0d162b);
  border: 1px solid #1d2a4d;
  transition: .18s ease;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  line-height: 1;
}
.btn:hover {
  border-color: #3f6fff;
  background: linear-gradient(180deg, #142347, #101b36);
  transform: translateY(-2px);
  box-shadow: 0 0 18px rgba(79,140,255,.45), 0 8px 24px rgba(0,0,0,.7);
}
.btn:disabled {
  opacity: .4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
.btn-primary {
  background: linear-gradient(180deg, #1a3a7a, #122660);
  border-color: #3f6fff;
  font-size: 15px;
  font-weight: 600;
  padding: 14px 28px;
  width: 100%;
  justify-content: center;
  margin-top: 8px;
}
.btn-primary:hover:not(:disabled) {
  background: linear-gradient(180deg, #1f4494, #162e78);
  box-shadow: 0 0 24px rgba(79,140,255,.55), 0 8px 24px rgba(0,0,0,.7);
}

/* Button row: big button + small red trash */
.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  align-items: stretch;
}
.btn-row .btn-primary {
  width: auto;
  flex: 1;
  margin-top: 0;
}
.btn-delete-mode {
  background: linear-gradient(180deg, #7a1a1a, #601212) !important;
  border-color: #c0392b !important;
}
.btn-delete-mode:hover:not(:disabled) {
  background: linear-gradient(180deg, #8b2020, #701515) !important;
  box-shadow: 0 0 24px rgba(192,57,43,.55), 0 8px 24px rgba(0,0,0,.7) !important;
}
.btn-trash {
  width: 48px;
  flex-shrink: 0;
  background: linear-gradient(180deg, #4a1010, #3b0808);
  border: 1px solid #7a2020;
  border-radius: 10px;
  font-size: 18px;
  padding: 0;
  justify-content: center;
  cursor: pointer;
  color: var(--text);
  display: inline-flex;
  align-items: center;
  transition: .18s ease;
  line-height: 1;
  font-family: inherit;
}
.btn-trash:hover {
  background: linear-gradient(180deg, #6b1414, #4a0e0e);
  border-color: #c0392b;
  box-shadow: 0 0 18px rgba(192,57,43,.4);
  transform: translateY(-2px);
}
.btn-trash.active {
  background: linear-gradient(180deg, #1a1a2e, #111122);
  border-color: #3f3f6f;
  color: var(--muted);
}
.btn-trash.active:hover {
  background: linear-gradient(180deg, #22224a, #191938);
  border-color: #5f5faf;
  box-shadow: none;
}

/* Delete input block */
.delete-block {
  padding: 20px 22px;
}
.delete-block label {
  display: block;
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 5px;
}
.delete-block input {
  width: 100%;
  background: #02050c;
  border: 1px solid #1d2a4d;
  border-radius: 8px;
  padding: 11px 14px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  transition: border-color .18s;
  margin-bottom: 14px;
}
.delete-block input:last-child { margin-bottom: 0; }
.delete-block input:focus {
  outline: none;
  border-color: var(--accent);
}

/* Confirmation modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,7,.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(2px);
}
.modal {
  background: linear-gradient(180deg, #0e172b 0%, #0b1222 100%);
  border: 1px solid #1d2a4d;
  border-radius: 14px;
  padding: 28px 24px;
  max-width: 400px;
  width: 90%;
  box-shadow: 0 0 60px rgba(0,0,0,.8);
}
.modal h3 { margin: 0 0 10px; font-size: 17px; }
.modal p  { color: var(--muted); font-size: 14px; margin: 0 0 6px; line-height: 1.5; }
.modal .range-label { color: var(--text); font-weight: 600; word-break: break-all; }
.modal .confirm-num { color: var(--err); font-size: 22px; font-weight: 700; }
.modal-input {
  width: 100%;
  background: #02050c;
  border: 1px solid #1d2a4d;
  border-radius: 8px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 20px;
  text-align: center;
  font-family: inherit;
  margin: 12px 0 16px;
  transition: border-color .18s;
}
.modal-input:focus { outline: none; border-color: var(--err); }
.modal-input.wrong {
  border-color: var(--err);
  animation: shake .25s;
}
.modal-actions { display: flex; gap: 10px; }
.modal-actions .btn { flex: 1; justify-content: center; }
.btn-danger {
  background: linear-gradient(180deg, #7a1a1a, #601212);
  border-color: #c0392b;
}
.btn-danger:hover:not(:disabled) {
  background: linear-gradient(180deg, #8b2020, #701515);
  box-shadow: 0 0 24px rgba(192,57,43,.55), 0 8px 24px rgba(0,0,0,.7);
  transform: translateY(-2px);
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25%       { transform: translateX(-7px); }
  75%       { transform: translateX(7px); }
}

.top-nav { margin-bottom: 28px; }
.title   { margin: 0; text-align: center; font-size: clamp(28px,5vw,40px); letter-spacing: .5px; }
.subtitle { margin: 8px 0 28px; text-align: center; color: var(--muted); font-size: 15px; }

.block {
  background: linear-gradient(180deg, #0e172b 0%, #0b1222 100%);
  border: 1px solid #1d2a4d;
  border-radius: 14px;
  padding: 20px 22px;
  margin-bottom: 16px;
  box-shadow: 0 0 40px rgba(40,90,200,.15), 0 0 8px rgba(80,140,255,.15) inset;
}

/* drop zone */
.drop-zone {
  border: 2px dashed #1d2a4d;
  border-radius: 12px;
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .18s, background .18s;
  color: var(--muted);
}
.drop-zone:hover, .drop-zone.over {
  border-color: var(--accent);
  background: rgba(79,140,255,.06);
}
.drop-zone p { margin: 6px 0; }
.drop-zone .icon { font-size: 32px; margin-bottom: 6px; }
.file-chosen { font-size: 13px; color: var(--accent); margin-top: 10px; }

/* log */
.log-wrap {
  background: #02050c;
  border: 1px solid #1d2a4d;
  border-radius: 12px;
  overflow: hidden;
}
.log-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid #1d2a4d;
  font-size: 13px;
  color: var(--muted);
}
.log-header a { color: var(--accent); font-size: 12px; text-decoration: none; }
.log-header a:hover { text-decoration: underline; }
pre#log-out {
  margin: 0;
  padding: 14px 16px;
  font-size: 12px;
  font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 420px;
  overflow-y: auto;
  line-height: 1.6;
  color: #c8d4f0;
}
.log-info  { color: #c8d4f0; }
.log-error { color: var(--err); }
.log-warn  { color: var(--warn); }

/* result */
.result {
  border-radius: 12px;
  padding: 16px 20px;
  font-size: 14px;
  font-weight: 600;
  text-align: center;
}
.result.ok      { background: rgba(76,255,145,.08); border: 1px solid rgba(76,255,145,.25); color: var(--ok); }
.result.partial { background: rgba(255,209,102,.08); border: 1px solid rgba(255,209,102,.25); color: var(--warn); }
.result.err     { background: rgba(255,107,107,.08); border: 1px solid rgba(255,107,107,.25); color: var(--err); }

.hidden { display: none !important; }
</style>
</head>
<body>
<main class="page">

  <div class="top-nav"><a class="btn" href="/">← Home</a></div>
  <h1 class="title">ES Lists Import</h1>
  <p class="subtitle">Загрузка баз в ExpertSender</p>

  <!-- Upload block (drop zone) -->
  <div class="block" style="padding:0" id="upload-block">
    <div class="drop-zone" id="drop-zone">
      <div class="icon">📦</div>
      <p>Перетащи архив с базами</p>
      <p style="font-size:13px">ZIP, RAR, TGZ — или нажми для выбора файла</p>
      <input type="file" id="file-input" accept=".zip,.rar,.tgz,.tar.gz" hidden>
    </div>
  </div>
  <p class="file-chosen hidden" id="file-chosen"></p>

  <!-- Delete block (shown instead of drop zone in delete mode) -->
  <div class="block hidden" id="delete-block">
    <label for="delete-range">Диапазон листов для удаления</label>
    <input type="text" id="delete-range"
           placeholder="например: 4270-4284 или 4270, 4280-4284"
           oninput="checkDeleteReady()" autocomplete="off" spellcheck="false">
    <label for="delete-password">Пароль сервиса</label>
    <input type="password" id="delete-password"
           placeholder="••••••••" autocomplete="current-password"
           oninput="checkDeleteReady()">
  </div>

  <!-- Main button row -->
  <div class="btn-row">
    <button class="btn btn-primary" id="import-btn" disabled onclick="handleMainBtn()">
      Загрузить базы
    </button>
    <button class="btn btn-trash" id="trash-btn" onclick="toggleDeleteMode()" title="Удалить базы">
      🗑
    </button>
  </div>

  <!-- Log -->
  <div class="log-wrap hidden" id="log-wrap" style="margin-top:16px">
    <div class="log-header">
      <span>Логи</span>
      <span id="run-link"></span>
    </div>
    <pre id="log-out"></pre>
  </div>

  <!-- Result -->
  <div class="hidden" id="result-area" style="margin-top:12px"></div>

  <!-- Delete confirmation modal -->
  <div class="modal-overlay hidden" id="confirm-modal">
    <div class="modal">
      <h3>Подтвердите удаление</h3>
      <p>Листы: <span class="range-label" id="confirm-range-text"></span></p>
      <p style="margin-top:8px">
        Введите число <span class="confirm-num">5</span> для подтверждения:
      </p>
      <input type="text" class="modal-input" id="confirm-number-input"
             placeholder="5" maxlength="5" inputmode="numeric"
             oninput="this.classList.remove('wrong')"
             onkeydown="if(event.key==='Enter') confirmDelete()">
      <div class="modal-actions">
        <button class="btn" onclick="closeDeleteConfirm()">Отмена</button>
        <button class="btn btn-danger" onclick="confirmDelete()">Удалить базы</button>
      </div>
    </div>
  </div>

</main>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const CF_BASE_URL       = 'https://europe-west1-gen-lang-client-0771120655.cloudfunctions.net/es-api';
const DELETE_WORKER_URL = 'wss://YOUR_DELETE_RUNNER_URL/ws/delete'; // TODO: update after deploy
const GCS_BUCKET        = 'es-lists-jevgenia';
const REPO              = 'evinaeva/jevgenia.github.io';
const BRANCH            = 'main';

// ── File selection ──────────────────────────────────────────────────────────
let selectedFile = null;
let uploadUrl    = null;
let gcsPath      = null;

const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) setFile(fileInput.files[0]);
});

function setFile(f) {
  selectedFile = f;
  uploadUrl    = null;
  gcsPath      = null;

  const info = document.getElementById('file-chosen');
  info.textContent = `✓ ${f.name}  (${(f.size / 1024 / 1024).toFixed(1)} MB)  — получаю URL для загрузки…`;
  info.classList.remove('hidden');
  document.getElementById('import-btn').disabled = true;

  const sessionId = uuid();
  fetch(`${CF_BASE_URL}/get-upload-url?session_id=${encodeURIComponent(sessionId)}&filename=${encodeURIComponent(f.name)}`)
    .then(r => {
      if (!r.ok) return r.text().then(t => { throw new Error(`CF error ${r.status}: ${t.slice(0,200)}`); });
      return r.json();
    })
    .then(data => {
      uploadUrl = data.url;
      gcsPath   = data.gcs_path;
      info.textContent = `✓ ${f.name}  (${(f.size / 1024 / 1024).toFixed(1)} MB)`;
      if (!deleteMode) document.getElementById('import-btn').disabled = false;
    })
    .catch(err => {
      info.textContent = `✗ Не удалось получить URL: ${err.message}`;
      info.style.color = 'var(--err)';
    });
}

// ── UUID ────────────────────────────────────────────────────────────────────
function uuid() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
}

// ── Log helpers ─────────────────────────────────────────────────────────────
let lastLogCount = 0;

function addLocalLog(msg, level = 'info') {
  const el = document.getElementById('log-out');
  const span = document.createElement('span');
  span.className = `log-${level}`;
  const t = new Date().toTimeString().slice(0, 8);
  span.textContent = `${t}  ${msg}\n`;
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

function renderLogs(logs) {
  const el = document.getElementById('log-out');
  const newEntries = logs.slice(lastLogCount);
  for (const e of newEntries) {
    const span = document.createElement('span');
    span.className = `log-${e.level}`;
    span.textContent = `${e.t}  ${e.msg}\n`;
    el.appendChild(span);
  }
  if (newEntries.length > 0) {
    el.scrollTop = el.scrollHeight;
    lastLogCount = logs.length;
  }
}

let lastChunk = -1;

async function pollLogs(logId) {
  const nextChunk = lastChunk + 1;
  const url = `https://storage.googleapis.com/${GCS_BUCKET}/logs/${logId}/${nextChunk}.json`;
  try {
    const r = await fetch(url + '?_=' + Date.now());
    if (!r.ok) return null;
    const data = await r.json();
    lastChunk = nextChunk;
    return data;
  } catch (_) {
    return null;
  }
}

async function findRunUrl() {
  for (let i = 0; i < 10; i++) {
    await sleep(3000);
    try {
      const r = await fetch(
        `https://api.github.com/repos/${REPO}/actions/runs?event=workflow_dispatch&branch=${BRANCH}&per_page=5`
      );
      const data = await r.json();
      if (data.workflow_runs && data.workflow_runs.length > 0) {
        return data.workflow_runs[0].html_url;
      }
    } catch (_) {}
  }
  return null;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Delete mode ─────────────────────────────────────────────────────────────
let deleteMode = false;

function toggleDeleteMode() {
  deleteMode = !deleteMode;
  const uploadBlock = document.getElementById('upload-block');
  const deleteBlock = document.getElementById('delete-block');
  const fileChosen  = document.getElementById('file-chosen');
  const mainBtn     = document.getElementById('import-btn');
  const trashBtn    = document.getElementById('trash-btn');

  if (deleteMode) {
    uploadBlock.classList.add('hidden');
    fileChosen.classList.add('hidden');
    deleteBlock.classList.remove('hidden');
    mainBtn.textContent = 'Удалить базы';
    mainBtn.classList.add('btn-delete-mode');
    mainBtn.disabled = true;
    trashBtn.classList.add('active');
    trashBtn.title = 'Отмена';
    trashBtn.textContent = '✕';
    const savedPw = sessionStorage.getItem('del_pw');
    if (savedPw) document.getElementById('delete-password').value = savedPw;
    checkDeleteReady();
  } else {
    uploadBlock.classList.remove('hidden');
    deleteBlock.classList.add('hidden');
    mainBtn.textContent = 'Загрузить базы';
    mainBtn.classList.remove('btn-delete-mode');
    mainBtn.disabled = !(uploadUrl && selectedFile);
    trashBtn.classList.remove('active');
    trashBtn.title = 'Удалить базы';
    trashBtn.textContent = '🗑';
  }
}

function isValidRange(s) {
  if (!s) return false;
  for (const chunk of s.split(',')) {
    const c = chunk.trim();
    if (!c) return false;
    if (!/^\d+(-\d+)?$/.test(c)) return false;
  }
  return true;
}

function checkDeleteReady() {
  if (!deleteMode) return;
  const range = document.getElementById('delete-range').value.trim();
  const pw    = document.getElementById('delete-password').value.trim();
  document.getElementById('import-btn').disabled = !(isValidRange(range) && pw);
}

function handleMainBtn() {
  if (deleteMode) {
    showDeleteConfirm();
  } else {
    startImport();
  }
}

// ── Delete confirmation modal ───────────────────────────────────────────────
function showDeleteConfirm() {
  const range = document.getElementById('delete-range').value.trim();
  document.getElementById('confirm-range-text').textContent = range;
  document.getElementById('confirm-number-input').value = '';
  document.getElementById('confirm-number-input').classList.remove('wrong');
  document.getElementById('confirm-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('confirm-number-input').focus(), 50);
}

function closeDeleteConfirm() {
  document.getElementById('confirm-modal').classList.add('hidden');
}

function confirmDelete() {
  const val = document.getElementById('confirm-number-input').value.trim();
  if (val !== '5') {
    const inp = document.getElementById('confirm-number-input');
    inp.classList.remove('wrong');
    void inp.offsetWidth; // reflow to re-trigger animation
    inp.classList.add('wrong');
    return;
  }
  closeDeleteConfirm();
  startDelete();
}

document.getElementById('confirm-modal').addEventListener('click', function(e) {
  if (e.target === this) closeDeleteConfirm();
});

// ── Delete via WebSocket ────────────────────────────────────────────────────
async function startDelete() {
  const range    = document.getElementById('delete-range').value.trim();
  const password = document.getElementById('delete-password').value.trim();
  sessionStorage.setItem('del_pw', password);

  const mainBtn = document.getElementById('import-btn');
  mainBtn.disabled = true;
  mainBtn.textContent = 'Удаляю…';

  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('log-wrap').classList.remove('hidden');
  document.getElementById('log-out').textContent = '';
  document.getElementById('run-link').innerHTML = '';

  addLocalLog('Подключаюсь к сервису удаления…');

  try {
    await new Promise((resolve, reject) => {
      const ws = new WebSocket(DELETE_WORKER_URL);

      ws.onopen = () => {
        ws.send(JSON.stringify({ id_range: range, password }));
      };

      ws.onmessage = event => {
        let msg;
        try { msg = JSON.parse(event.data); } catch { return; }
        if (msg.type === 'ping') return;

        const level = (msg.type === 'ok')        ? 'info'
                    : (msg.type === 'error_line') ? 'error'
                    : (msg.type === 'error')      ? 'error'
                    : (msg.type === 'stderr')     ? 'warn'
                    : 'info';

        addLocalLog(`${msg.ts}  ${msg.text}`, level);

        if (msg.type === 'done')   { showResult('done', '✓ Листы успешно удалены');     resolve(); }
        if (msg.type === 'failed') { showResult('error', '✗ Завершено с ошибками — см. логи'); resolve(); }
        if (msg.type === 'error' && msg.text.startsWith('❌')) { showResult('error'); resolve(); }
      };

      ws.onerror = () => {
        reject(new Error('Ошибка соединения с сервисом удаления'));
      };

      ws.onclose = e => {
        if (e.code === 4403) {
          reject(new Error('Неверный пароль сервиса'));
        } else {
          resolve();
        }
      };
    });
  } catch (err) {
    addLocalLog(`Ошибка: ${err.message}`, 'error');
    showResult('error');
  }

  mainBtn.disabled = false;
  mainBtn.textContent = 'Удалить базы';
  checkDeleteReady();
}

// ── Import flow ─────────────────────────────────────────────────────────────
async function startImport() {
  if (!uploadUrl || !gcsPath || !selectedFile) return;

  const logId = gcsPath.split('/')[1];

  const btn = document.getElementById('import-btn');
  btn.disabled = true;
  btn.textContent = 'Загружаю…';

  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('log-wrap').classList.remove('hidden');
  document.getElementById('log-out').textContent = '';
  document.getElementById('run-link').innerHTML = '';
  lastLogCount = 0;
  lastChunk = -1;

  try {
    addLocalLog(`Загружаю архив в GCS… (${(selectedFile.size/1024/1024).toFixed(1)} MB)`);
    const uploadResp = await fetch(uploadUrl, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/octet-stream' },
      body: selectedFile,
    });
    if (!uploadResp.ok) {
      const txt = await uploadResp.text();
      throw new Error(`GCS upload failed ${uploadResp.status}: ${txt.slice(0, 200)}`);
    }
    addLocalLog('Архив загружен в GCS.');

    addLocalLog('Запускаю GitHub Actions workflow…');
    const trigResp = await fetch(`${CF_BASE_URL}/trigger-import`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: logId, gcs_path: gcsPath }),
    });
    if (!trigResp.ok) {
      const txt = await trigResp.text();
      throw new Error(`Trigger failed ${trigResp.status}: ${txt.slice(0, 200)}`);
    }
    addLocalLog('Workflow запущен. Ожидаю обработку…');

    findRunUrl().then(url => {
      if (url) {
        document.getElementById('run-link').innerHTML =
          `<a href="${url}" target="_blank" rel="noopener">→ GitHub Actions</a>`;
      }
    });

    btn.textContent = 'Выполняется…';
    let done = false;
    let noDataCount = 0;

    while (!done) {
      await sleep(3500);
      const data = await pollLogs(logId);
      if (!data) {
        noDataCount++;
        if (noDataCount > 40) {
          addLocalLog('Нет ответа от воркера более 2 минут. Проверь GitHub Actions.', 'warn');
          break;
        }
        continue;
      }
      noDataCount = 0;
      renderLogs(data.logs || []);
      if (data.status === 'done' || data.status === 'error' || data.status === 'partial') {
        done = true;
        showResult(data.status);
      }
    }

  } catch (err) {
    addLocalLog(`Ошибка: ${err.message}`, 'error');
    showResult('error');
  }

  btn.disabled = false;
  btn.textContent = 'Загрузить базы';
  uploadUrl = null;
  gcsPath   = null;
  selectedFile = null;
  document.getElementById('file-chosen').classList.add('hidden');
}

function showResult(status, customText) {
  const el = document.getElementById('result-area');
  el.classList.remove('hidden');
  const map = {
    done:    { cls: 'ok',      text: customText || '✓ Все базы успешно загружены в ES' },
    partial: { cls: 'partial', text: customText || '⚠ Завершено с ошибками — см. логи' },
    error:   { cls: 'err',     text: customText || '✗ Ошибка — см. логи выше' },
  };
  const { cls, text } = map[status] || map.error;
  el.innerHTML = `<div class="result ${cls}">${text}</div>`;
}
</script>
</body>
</html>
