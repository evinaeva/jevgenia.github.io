<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Варианты подарка 2026</title>
  <meta name="description" content="Curated executive gift shortlist with rationale, pricing, and delivery considerations." />
  <style>
    :root {
      --bg: #071124;
      --panel: #0d1a35;
      --panel-soft: #13264a;
      --text: #eceff4;
      --muted: #a4adba;
      --line: #29456f;
      --accent: #4f86d9;
      --focus: #79a7ef;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Roboto, system-ui, sans-serif;
      background: radial-gradient(circle at 30% -10%, #193562 0, transparent 45%), var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    a { color: inherit; }

    .container {
      width: min(1160px, calc(100% - 3rem));
      margin: 0 auto;
    }

    .hero {
      padding: 2rem 0 3rem;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.3rem 0.7rem;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.6rem);
      margin: 0;
      letter-spacing: 0.01em;
      line-height: 1.12;
    }

    .hero p {
      margin: 1rem 0 0;
      color: var(--muted);
      max-width: 64ch;
      font-size: clamp(1rem, 1.8vw, 1.2rem);
    }

    .summary {
      margin: 2.4rem 0 3.6rem;
      background: linear-gradient(160deg, #163766 0%, #0e1f3d 100%);
      border: 1px solid #35598a;
      border-radius: 20px;
      padding: 1.5rem 1.6rem;
      box-shadow: var(--shadow);
    }

    .summary h2,
    .options h2 { font-size: 0.92rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 0 0 0.7rem; }

    .summary .choice {
      display: block;
      font-size: clamp(1.2rem, 2.2vw, 1.8rem);
      font-weight: 600;
      margin-bottom: 0.35rem;
    }

    .summary p { margin: 0; color: #d3d8e2; }

    .options { padding-bottom: 5rem; }

    .option-card {
      margin-top: 1.7rem;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-soft) 100%);
      overflow: hidden;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: minmax(320px, 0.95fr) 1fr;
      align-items: start;
    }

    .option-card.recommended {
      border-color: #4c73ad;
      box-shadow: 0 20px 55px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(79, 134, 217, 0.25), 0 0 28px rgba(79, 134, 217, 0.2);
    }

    .media { border-right: 1px solid var(--line); padding: 1.2rem; max-width: 560px; width: 100%; }

    .main-image {
      width: 100%;
      aspect-ratio: var(--image-ratio, 3 / 4);
      object-fit: contain;
      border-radius: 14px;
      border: 1px solid #436392;
      cursor: pointer;
      background: #091226;
      box-shadow: inset 0 0 0 1px rgba(121, 167, 239, 0.22), 0 0 28px rgba(79, 134, 217, 0.16);
    }

    .thumbs {
      margin-top: 0.75rem;
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.2rem;
    }

    .thumb {
      border: 1px solid #385c8f;
      border-radius: 10px;
      padding: 0;
      background: transparent;
      cursor: pointer;
      width: 64px;
      height: 82px;
      flex: 0 0 auto;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 9px;
      opacity: 0.8;
      background: #091226;
    }

    .thumb.active { border-color: var(--accent); box-shadow: 0 0 12px rgba(79, 134, 217, 0.35); }
    .thumb.active img { opacity: 1; }

    .content { padding: 1.3rem 1.4rem 1.5rem; }


    h3 { margin: 0.3rem 0 0.65rem; font-size: 1.5rem; line-height: 1.25; }

    .grid-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.6rem;
      margin: 0.85rem 0 1rem;
    }

    .meta-box {
      border: 1px solid #35527f;
      border-radius: 12px;
      padding: 0.6rem 0.7rem;
      background: rgba(255, 255, 255, 0.04);
    }

    .meta-box strong { display: block; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 0.2rem; }

    .external-link {
      display: inline-block;
      margin-bottom: 0.95rem;
      text-decoration: none;
      border: 1px solid #4a6998;
      border-radius: 10px;
      padding: 0.5rem 0.8rem;
      font-weight: 500;
      color: #edf2fa;
      background: #17305a;
    }

    .external-link:hover,
    .external-link:focus-visible { border-color: var(--accent); box-shadow: 0 0 16px rgba(79, 134, 217, 0.35); }

    .content p { margin: 0 0 0.7rem; color: #d5dae3; }

    .list-title { font-weight: 600; margin: 0.75rem 0 0.2rem; font-size: 0.95rem; color: #f2f4f8; }
    ul { margin: 0; padding-left: 1.2rem; color: #d3d8e1; }

    .footer {
      border-top: 1px solid var(--line);
      padding: 1.5rem 0 2.6rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(2, 3, 4, 0.9);
      z-index: 20;
      padding: 1.5rem;
    }

    .lightbox.open { display: flex; }

    .lightbox-content {
      position: relative;
      width: min(1200px, 92vw);
      max-height: 90vh;
      border: 1px solid #4b5361;
      border-radius: 14px;
      background: #0f1217;
      padding: 0.8rem;
    }

    .lightbox img {
      width: 100%;
      max-height: calc(90vh - 4rem);
      object-fit: contain;
      display: block;
      border-radius: 10px;
      background: #0a0d12;
    }

    .lightbox button {
      position: absolute;
      border: 1px solid #515b6a;
      background: rgba(14, 18, 24, 0.9);
      color: #f4f7fe;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .lightbox-close { top: 0.85rem; right: 0.85rem; }
    .lightbox-prev, .lightbox-next { top: 50%; transform: translateY(-50%); }
    .lightbox-prev { left: 0.85rem; }
    .lightbox-next { right: 0.85rem; }

    button:focus-visible,
    a:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    @media (max-width: 960px) {
      .option-card { grid-template-columns: 1fr; }
      .media { border-right: none; border-bottom: 1px solid var(--line); max-width: 100%; }
      .main-image { max-height: 62vh; }
    }

    @media (max-width: 640px) {
      .container { width: min(1160px, calc(100% - 1.4rem)); }
      .hero { padding-top: 4.2rem; }
      .grid-meta { grid-template-columns: 1fr; }
      .content { padding: 1.1rem; }
    }
  </style>
</head>
<body>
  <header class="hero">
   
  </header>

  <main class="container options" aria-label="Gift options"></main>

  <footer class="footer">
    
  </footer>

  <div class="lightbox" id="lightbox" aria-modal="true" role="dialog" aria-label="Image viewer">
    <div class="lightbox-content">
      <button class="lightbox-close" id="lightboxClose" aria-label="Close image viewer">×</button>
      <button class="lightbox-prev" id="lightboxPrev" aria-label="Previous image">←</button>
      <img id="lightboxImage" src="" alt="" />
      <button class="lightbox-next" id="lightboxNext" aria-label="Next image">→</button>
    </div>
  </div>

  <script>
    const gifts = [
	      {
        title: "Фрагмент обшивки болида W09 Льюиса Хэмилтона",
        category: "Emotional gift",
        rankingLabel: "Best overall fit",
        recommended: true,
        price: "351,95 €",
        delivery: "5 рабочих дней",
        rationale: "Оригинальный фрагмент обшивки болида Mercedes 2018 года Льюиса Хэмилтона, помещённый в акриловую витрину с сертификатом подлинности F1. <br>2018 год —  это один из пиков его карьеры в эре доминирования 2014–2020.  <br><br>F1 и конкретно этот гонщик — его фавориты, рамочку можно открыть и потрогать кусок болида :)<br>На сдачу можно добавить принт в рамке этого же болида https://www.drawonce.com/product/lewis5x (доставка 5-7 рабочих дней).<br><br>Важно: Please note that all F1 bodywork is unique and therefore the item you receive may differ slightly in shape, size and design, to the one pictured. ",
        pros: [
          "F1 и конкретно этот гонщик — его фавориты",          
          "Рамочку можно открыть и потрогать кусок болида :)" 
		  
		 
        ],
        cons: ["?"],
        link: "https://www.f1authentics.com/products/lewis-hamilton-2018-bodywork-in-acrylic-1?variant=53518457176445",
        linkLabel: "Посмотреть на сайте продавца >>",
        extraLinks: [
          { href: "https://www.f1authentics.com/products/lewis-hamilton-2015-bodywork-in-acrylicc?variant=53518241333629", text: "2015" },
          { href: "https://www.f1authentics.com/products/lewis-hamilton-2016-bodywork-in-acrylic-2?variant=53518237335933", text: "2016" },
          { href: "https://www.f1authentics.com/products/lewis-hamilton-2014-bodywork-acrylic-1?variant=53518191985021", text: "2014" },
          
        ],
        images: [
          { src: "assets/gifts/lew0.jpg", alt: "Lewis Hamilton 2018 bodywork in acrylic concept" },
          { src: "assets/gifts/lew3.webp", alt: "Lewis Hamilton 2018 bodywork in acrylic concept" },
          
          { src: "assets/gifts/lew2.jpg", alt: "Complementary framed print concept" }
        ]
      },
      

      {
        title: "Подписанная шайба вратаря любимой хоккейной команды",
        category: "Emotional / sports memorabilia",
        rankingLabel: "Strong interior piece",
        price: "340 €",
        delivery: "~10 рабочих дней",
        rationale: "Владу нравится хоккей и конкретно команда New York Rangers. <br><br>Автограф легенды Rangers Хенрика Лундквиста: оригинальная хоккейная шайба с его подписью в теневой рамке, карьерная статистика, сертификат подлинности Fanatics Authentic COA. <br><br>Влад раньше мечтал стать вратарём. Henrik Lundqvist — легендарный вратарь New York Rangers — играл за команду 15 сезонов (2005–2020). 887 матчей, 459 побед (рекорд Rangers), Vezina Trophy 2012 (лучший вратарь NHL).",
        pros: ["ff"],

        link: "https://shop.nhl.com/new-york-rangers/autographed-new-york-rangers-henrik-lundqvist-fanatics-authentic-framed-rangers-career-statistic-hockey-puck-shadowbox-with-hockey-puck/t-14269682+p-0467714187189+z-9-4024400432",
        linkLabel: "Посмотреть на сайте продавца >>",
        extraLinks: [
          { href: "https://www.fanatics.com/nhl/new-york-rangers/chris-kreider-new-york-rangers-autographed-fanatics-authentic-framed-hockey-puck-shadowbox/o-1384+t-03601882+p-7955664547825+z-9-3711988090", text: "Chris Kreider version, но с 2025 он не в команде." }
        ],
        images: [
          { src: "assets/gifts/hoccey.jpg", alt: "Henrik Lundqvist framed hockey puck shadowbox concept" }
          
        ]
      },
      {
        title: "Traintrackr NYC Subway Circuit Board 2.0",
        category: "Design object / tech art",
        rankingLabel: "NYC-linked option",
        price: "261 €",
        delivery: "7–14 рабочих дней",
        rationale: "В этом году Влад был в Нью Йорке, очень ему понравилось. <br>Этот дизайнерский арт-объект может быть приятным напоминанием. <br><br>Плата с 599 RGB-светодиодами, показывающая реальное положение всех поездов нью-йоркского метро в реальном времени через WiFi (данные MTA API). <br>Подойдёт для кабинета: компактно (31x23 см), гипнотично пульсирует `жизнью` любимого NYC, не масс-маркет. <br>Дополнит Bearbrick, подчеркнёт вкус и любовь к Нью-Йорку.",
        pros: [
          "Distinctive and memorable",
          "Good office/interior object",
          "New York connection is strong",
          "Around 200 EUR, so leaves room in budget"
        ],
        cons: ["Less personally targeted than the Lewis Hamilton option"],
        link: "https://store.moma.org/en-ee/products/traintrackr-nyc-subway-circuit-board-2",
        linkLabel: "Посмотреть на сайте продавца >>",
        images: [
          { src: "assets/gifts/ny1.gif", alt: "Traintrackr NYC Subway Circuit Board overview" },
		  { src: "assets/gifts/ny2.gif", alt: "Traintrackr NYC Subway Circuit Board overview" },
          { src: "assets/gifts/ny.webp", alt: "Traintrackr circuit board detail visual" }
        ]
      },
	  {
        title: "Подарочная карта авиалиний",
        category: "Практичный подарок",
        rankingLabel: "Most practical",
        price: "Весь бюджет",
        delivery: "1-2 дня",
        rationale: "Практичный подарок, точно будет использовано, так как Влад любит путешествовать. <br>Можно выбрать любого авиаперевозчика. <br><br>Минус — подарок вряд ли вызовет эмоциональный отклик.",
        pros: [""],
        cons: ["Без фантазии", "Вряд ли вызовет эмоциональный отклик"],
        link: "https://www.turkishairlines.com/en-ee/gift-card/",
        linkLabel: "Посмотреть на сайте продавца >>",
        images: [
          { src: "assets/gifts/air.jpg", alt: "gift card" },
		  { src: "assets/gifts/giftcard.png", alt: "gift card" }
          
        ]
      }
    ];

    const optionsRoot = document.querySelector('.options');
    let activeGallery = null;
    let activeIndex = 0;

    const fallbackByExtension = {
      svg: ['png', 'webp', 'gif'],
      png: ['webp', 'gif', 'svg'],
      webp: ['png', 'gif', 'svg'],
      gif: ['webp', 'png', 'svg'],
      jpg: ['webp', 'png', 'gif', 'svg'],
      jpeg: ['webp', 'png', 'gif', 'svg']
    };

    const getFallbackSources = (sourcePath) => {
      const match = sourcePath.match(/^(.*)\.([a-z0-9]+)(\?.*)?$/i);
      if (!match) return [];

      const [, basePath, extRaw, query = ''] = match;
      const ext = extRaw.toLowerCase();
      const fallbackExtensions = fallbackByExtension[ext] || ['png', 'webp', 'gif', 'svg'];

      return fallbackExtensions
        .filter((candidateExt, index, arr) => arr.indexOf(candidateExt) === index && candidateExt !== ext)
        .map((candidateExt) => `${basePath}.${candidateExt}${query}`);
    };

    const setImageSource = (imgEl, source) => {
      imgEl.dataset.source = source.src;
      imgEl.dataset.fallbackSources = JSON.stringify(getFallbackSources(source.src));
      imgEl.src = source.src;
      imgEl.alt = source.alt;
      imgEl.dataset.fallbackIndex = '0';
    };

    const attachImageFallback = (imgEl) => {
      imgEl.addEventListener('error', () => {
        const fallbackSources = JSON.parse(imgEl.dataset.fallbackSources || '[]');
        const fallbackIndex = Number(imgEl.dataset.fallbackIndex || 0);

        if (fallbackIndex >= fallbackSources.length) return;

        const nextSource = fallbackSources[fallbackIndex];
        imgEl.dataset.fallbackIndex = String(fallbackIndex + 1);
        imgEl.src = nextSource;
      });
    };

    const updateImageRatio = (imgEl) => {
      const ratio = imgEl.naturalWidth / imgEl.naturalHeight;
      if (!ratio || Number.isNaN(ratio)) return;
      imgEl.style.setProperty('--image-ratio', ratio > 1.08 ? '16 / 10' : '3 / 4');
    };

    function createOptionCard(item, cardIndex) {
      const card = document.createElement('article');
      card.className = `option-card${item.recommended ? ' recommended' : ''}`;
      card.setAttribute('aria-label', item.title);

      const media = document.createElement('div');
      media.className = 'media';

      const mainImage = document.createElement('img');
      mainImage.className = 'main-image';
      setImageSource(mainImage, item.images[0]);
      attachImageFallback(mainImage);
      mainImage.addEventListener('load', () => updateImageRatio(mainImage));
      mainImage.dataset.card = cardIndex;
      mainImage.dataset.index = 0;
      mainImage.tabIndex = 0;
      mainImage.addEventListener('click', () => openLightbox(cardIndex, Number(mainImage.dataset.index)));
      mainImage.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openLightbox(cardIndex, Number(mainImage.dataset.index));
        }
      });

      const thumbs = document.createElement('div');
      thumbs.className = 'thumbs';

      item.images.forEach((image, imageIndex) => {
        const thumb = document.createElement('button');
        thumb.className = `thumb${imageIndex === 0 ? ' active' : ''}`;
        thumb.type = 'button';
        thumb.setAttribute('aria-label', `Show image ${imageIndex + 1} for ${item.title}`);
        thumb.innerHTML = `<img src="${image.src}" alt="${image.alt}">`;
        const thumbImage = thumb.querySelector('img');
        setImageSource(thumbImage, image);
        attachImageFallback(thumbImage);
        thumb.addEventListener('click', () => {
          setImageSource(mainImage, image);
          mainImage.dataset.index = imageIndex;
          thumbs.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === imageIndex));
        });
        thumbs.appendChild(thumb);
      });

      media.append(mainImage, thumbs);

      const content = document.createElement('div');
      content.className = 'content';

      const title = document.createElement('h3');
      title.textContent = item.title;

      const metaGrid = document.createElement('div');
      metaGrid.className = 'grid-meta';
      metaGrid.innerHTML = `<div class="meta-box"><strong>Цена</strong>${item.price.replace('Price: ', '')}</div><div class="meta-box"><strong>Доставка</strong>${item.delivery.replace('Delivery: ', '')}</div>`;

      const linkBlock = document.createElement('div');
      if (item.link) {
        linkBlock.innerHTML = `<a class="external-link" target="_blank" rel="noopener noreferrer" href="${item.link}">${item.linkLabel}</a>`;
      } else {
        linkBlock.innerHTML = `<span class="external-link" role="note" aria-label="No product link available">No product link provided</span>`;
      }

      const rationale = document.createElement('p');
      rationale.innerHTML = `<strong>Информация:</strong> ${item.rationale}`;

      content.append(title, metaGrid, linkBlock, rationale);

      if (item.extraLinks && item.extraLinks.length) {
        const extra = document.createElement('p');
        extra.className = 'list-title';
        extra.textContent = 'Другие варианты';
        const list = document.createElement('ul');
        item.extraLinks.forEach((entry) => {
          const li = document.createElement('li');
          li.innerHTML = `<a target="_blank" rel="noopener noreferrer" href="${entry.href}">${entry.text}</a>`;
          list.appendChild(li);
        });
        content.append(extra, list);
      }

      card.append(media, content);
      return card;
    }

    gifts.forEach((gift, i) => optionsRoot.appendChild(createOptionCard(gift, i)));

    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightboxImage');
    const lightboxClose = document.getElementById('lightboxClose');
    const lightboxPrev = document.getElementById('lightboxPrev');
    const lightboxNext = document.getElementById('lightboxNext');

    attachImageFallback(lightboxImage);

    function renderLightboxImage() {
      const image = gifts[activeGallery].images[activeIndex];
      setImageSource(lightboxImage, image);
    }

    function openLightbox(galleryIndex, imageIndex) {
      activeGallery = galleryIndex;
      activeIndex = imageIndex;
      renderLightboxImage();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
      lightboxClose.focus();
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function showNext(step) {
      if (activeGallery === null) return;
      const total = gifts[activeGallery].images.length;
      activeIndex = (activeIndex + step + total) % total;
      renderLightboxImage();
    }

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', () => showNext(-1));
    lightboxNext.addEventListener('click', () => showNext(1));

    lightbox.addEventListener('click', (event) => {
      if (event.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (event) => {
      if (!lightbox.classList.contains('open')) return;
      if (event.key === 'Escape') closeLightbox();
      if (event.key === 'ArrowLeft') showNext(-1);
      if (event.key === 'ArrowRight') showNext(1);
    });
  </script>
</body>
</html>
